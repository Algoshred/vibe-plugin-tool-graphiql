<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GraphQL Playground - VibeControls</title>

  <!-- GraphiQL dependencies from CDN -->
  <link rel="stylesheet" href="https://unpkg.com/graphiql@3/graphiql.min.css" />
  <style>
    :root {
      --brand-primary: #6366f1;
      --brand-primary-hover: #4f46e5;
      --brand-bg: #ffffff;
      --brand-text: #1e293b;
      --brand-text-muted: #64748b;
      --brand-border: #e2e8f0;
      --brand-surface: #f8fafc;
      --header-height: 48px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --brand-bg: #0f172a;
        --brand-text: #e2e8f0;
        --brand-text-muted: #94a3b8;
        --brand-border: #334155;
        --brand-surface: #1e293b;
      }
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--brand-bg);
      color: var(--brand-text);
      height: 100vh;
      overflow: hidden;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: var(--header-height);
      padding: 0 16px;
      background: var(--brand-surface);
      border-bottom: 1px solid var(--brand-border);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-logo {
      width: 24px;
      height: 24px;
      background: var(--brand-primary);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 14px;
    }

    .header-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--brand-text);
    }

    .header-subtitle {
      font-size: 12px;
      color: var(--brand-text-muted);
    }

    .graphiql-container {
      height: calc(100vh - var(--header-height));
    }

    /* Loading / error states */
    .state-overlay {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: calc(100vh - var(--header-height));
      gap: 16px;
      color: var(--brand-text-muted);
    }

    .state-overlay .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--brand-border);
      border-top-color: var(--brand-primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .state-overlay .error-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #fef2f2;
      color: #dc2626;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: bold;
    }

    @media (prefers-color-scheme: dark) {
      .state-overlay .error-icon {
        background: #450a0a;
        color: #f87171;
      }
    }

    .state-overlay .error-message {
      max-width: 480px;
      text-align: center;
      font-size: 14px;
      line-height: 1.5;
    }

    .state-overlay .error-detail {
      font-size: 12px;
      color: var(--brand-text-muted);
      background: var(--brand-surface);
      padding: 8px 16px;
      border-radius: 6px;
      border: 1px solid var(--brand-border);
      max-width: 480px;
      word-break: break-all;
    }

    /* Override GraphiQL theme for dark mode */
    @media (prefers-color-scheme: dark) {
      .graphiql-container {
        --color-base: var(--brand-bg);
        --color-primary: 99, 102, 241;
      }
    }
  </style>
</head>
<body>
  <!-- Header bar -->
  <div class="header">
    <div class="header-left">
      <div class="header-logo">V</div>
      <span class="header-title">GraphQL Playground</span>
      <span class="header-subtitle" id="endpoint-label"></span>
    </div>
  </div>

  <!-- Content area (loading / error / graphiql) -->
  <div id="root">
    <div class="state-overlay" id="loading-state">
      <div class="spinner"></div>
      <div>Loading GraphiQL configuration...</div>
    </div>
  </div>

  <!-- React + GraphiQL from CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/graphiql@3/graphiql.min.js"></script>

  <script>
    (function () {
      "use strict";

      // -- Helpers ----------------------------------------------------------

      function getQueryParam(name) {
        var params = new URLSearchParams(window.location.search);
        return params.get(name);
      }

      function getApiBase() {
        // The plugin API is served at the same origin as the static UI
        return window.location.origin;
      }

      function showError(title, detail) {
        var root = document.getElementById("root");
        root.innerHTML =
          '<div class="state-overlay">' +
          '<div class="error-icon">!</div>' +
          '<div class="error-message">' + escapeHtml(title) + "</div>" +
          (detail ? '<div class="error-detail">' + escapeHtml(detail) + "</div>" : "") +
          "</div>";
      }

      function escapeHtml(str) {
        var div = document.createElement("div");
        div.textContent = str;
        return div.innerHTML;
      }

      // -- Main -------------------------------------------------------------

      var vibeId = getQueryParam("vibeId");
      var apiKey = getQueryParam("apiKey") || "";

      if (!vibeId) {
        showError(
          "Missing vibeId parameter",
          "The GraphiQL playground requires a vibeId query parameter to load the endpoint configuration."
        );
        return;
      }

      var apiBase = getApiBase();
      var configUrl = apiBase + "/api/graphiql/config/" + encodeURIComponent(vibeId);

      var headers = {
        "Content-Type": "application/json",
      };
      if (apiKey) {
        headers["x-agent-api-key"] = apiKey;
      }

      fetch(configUrl, { headers: headers })
        .then(function (res) {
          if (res.status === 404) {
            throw new Error("NO_CONFIG");
          }
          if (!res.ok) {
            throw new Error("HTTP " + res.status);
          }
          return res.json();
        })
        .then(function (data) {
          var config = data.config;
          if (!config || !config.graphqlUrl) {
            throw new Error("NO_CONFIG");
          }
          renderGraphiQL(config);
        })
        .catch(function (err) {
          if (err.message === "NO_CONFIG") {
            showError(
              "No GraphQL endpoint configured",
              "Use PUT /api/graphiql/config/" + vibeId + " to set a graphqlUrl before opening the playground."
            );
          } else {
            showError(
              "Failed to load configuration",
              err.message
            );
          }
        });

      // -- Render GraphiQL --------------------------------------------------

      function renderGraphiQL(config) {
        var label = document.getElementById("endpoint-label");
        if (label) {
          label.textContent = config.graphqlUrl;
        }

        var root = document.getElementById("root");
        root.innerHTML = "";
        root.className = "graphiql-container";

        var customHeaders = config.headers || {};

        function fetcher(graphQLParams) {
          return fetch(config.graphqlUrl, {
            method: "POST",
            headers: Object.assign(
              { "Content-Type": "application/json" },
              customHeaders
            ),
            body: JSON.stringify(graphQLParams),
          }).then(function (res) {
            return res.json();
          });
        }

        var el = React.createElement(GraphiQL, {
          fetcher: fetcher,
          defaultEditorToolsVisibility: true,
        });

        ReactDOM.createRoot(root).render(el);
      }
    })();
  </script>
</body>
</html>
